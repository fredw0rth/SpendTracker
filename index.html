<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SpendTracker</title>

<!-- PWA metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#030712" />

<!-- iOS-specific: makes "Add to Home Screen" launch fullscreen with no Safari chrome -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SpendTracker" />
<link rel="apple-touch-icon" href="icon-192.png" />

<style>
  /* Theme tokens for the app's neutral chrome (backgrounds, borders, text). Category/accent
     colours (work amber, split purple, credit green, danger red, primary blue) are fixed and
     unaffected by theme — only these neutrals flip. Dark is the default so existing users see
     no change; light is opted into via the switch in Settings, which sets data-theme on <html>. */
  :root, :root[data-theme="dark"] {
    --bg: #030712;
    --surface: #0f172a;
    --surface-2: #1e293b;
    --border: #1e293b;
    --border-strong: #334155;
    --text-muted: #475569;
    --text-secondary: #64748b;
    --text-tertiary: #94a3b8;
    --text-body: #cbd5e1;
    --text-primary: #e2e8f0;
    --text-heading: #f1f5f9;
    --on-accent: #f8fafc;
  }
  :root[data-theme="light"] {
    --bg: #f5efdf;
    --surface: #fffcf3;
    --surface-2: #ece0c4;
    --border: #e2d5b3;
    --border-strong: #cbb98c;
    --text-muted: #a3987d;
    --text-secondary: #857a5f;
    --text-tertiary: #6b6047;
    --text-body: #4a4128;
    --text-primary: #362e1c;
    --text-heading: #241f13;
    --on-accent: #fffcf3;
  }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    /* Prevents the elastic overscroll bounce revealing white/black gaps above/below content on iOS */
    overscroll-behavior-y: none;
    /* Respects the iPhone notch/home-indicator safe areas so content isn't obscured */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #root { min-height: 100vh; }
  /* Prevents iOS Safari's default blue tap-highlight and double-tap-to-zoom on buttons */
  button { touch-action: manipulation; }
</style>

<!-- React + ReactDOM (production builds, no dev warnings/overhead). Fetched from the CDN
     the first time you open this in Safari — after that, the service worker below caches
     them so the app keeps working offline. Requires normal internet access on first load.
     No Babel here: app.jsx is pre-compiled to plain app.js (see README), so the phone loads
     ready-to-run code instead of compiling ~1000 lines of JSX on every cold launch.
     Pinned to 18.3.1: React 19 removed these UMD browser builds entirely (the @19 URLs
     404), and 18.3.1 is the newest version that ships them. Don't bump past 18 here. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>

<!-- Applies the pre-unlock theme preference (crypto.js's PRE_THEME_KEY — a separate,
     unencrypted cousin of the real state.theme, which lives inside the encrypted vault and
     can't be read this early) before anything paints, so the lock/setup screens don't flash
     the other theme on a cold load. Runs before app.js/crypto.js so it can't reference their
     helpers directly — the "spendtracker_pretheme" key name must stay in sync with crypto.js. -->
<script>
  try {
    var t = localStorage.getItem("spendtracker_pretheme") === "light" ? "light" : "dark";
    document.documentElement.dataset.theme = t;
    var metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) metaTheme.content = t === "light" ? "#f5efdf" : "#030712";
  } catch (e) {}
</script>

<!-- app.js defines the tracker UI; crypto.js defines the encryption + lock screen
     that gates it. app.js must load first so crypto.js's Root can reference App
     and defaultState. -->
<script src="app.js"></script>
<script src="crypto.js"></script>
<script>
  const root = ReactDOM.createRoot(document.getElementById("root"));
  // Mount the encryption gate (Root), not App directly. Root shows onboarding /
  // migration / the lock screen, and only renders the real App once unlocked.
  root.render(React.createElement(window.SpendTrackerRoot));
</script>

<!-- Registers the service worker (offline caching) if the browser supports it -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        // Silently ignore — app still works fully online without the service worker,
        // it just won't have offline caching.
      });
    });
  }
</script>
</body>
</html>
